name: dippa

services:
  control:
    build:
      context: ./src
      dockerfile: control/Dockerfile
    depends_on:
      - rabbitmq
    volumes:
      - ./log:/app/log

  segmentor:
    build:
      context: ./src
      dockerfile: segmentor/Dockerfile
    depends_on:
      - control
    volumes:
      - ./log:/app/log
    configs:
      - config

  classifier:
    build:
      context: ./src
      dockerfile: classifier/Dockerfile
    depends_on:
      - control
      - segmentor
    volumes:
      - ./log:/app/log
    configs:
      - config
    ports:
      - 11435:11434

  robot:
    build:
      context: ./src
      dockerfile: robot/Dockerfile
    depends_on:
      - control
      - classifier
    volumes:
      - ./log:/app/log
    configs:
      - config

  rabbitmq:
    image: "rabbitmq:latest"
    container_name: "rabbitmq"
    ports:
      - 15673:15672
      - 5673:5672

configs:
  config:
    file: ./src/config.toml
